<script>
        function atualizarRelogio() {
            const agora = new Date();
            const fHora = { timeZone: 'America/Sao_Paulo', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            const fData = { timeZone: 'America/Sao_Paulo', day: '2-digit', month: 'long', weekday: 'long', year: 'numeric' };
            document.getElementById('relogio').textContent = agora.toLocaleTimeString('pt-BR', fHora);
            document.getElementById('data-atual').textContent = agora.toLocaleDateString('pt-BR', fData);
        }

        const spreadsheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRKxl-zvgTVOsrSbHGyDemOfdGq_aTVlkODbyfzlbXdeQGo1SOCipFqc3Dlh6hHl7uAsnMf0WgOX4Bt/pub?output=csv';

        async function fetchPlanilha() {
            const displays = {
                vol: document.getElementById('vol-valor'),
                drop: document.getElementById('drop-valor'),
                ocp: document.getElementById('ocp-valor'),
                nf: document.getElementById('nf-valor')
            };
            
            const statuses = [
                document.getElementById('status-vol'),
                document.getElementById('status-drop'),
                document.getElementById('status-ocp'),
                document.getElementById('status-nf')
            ];
            
            const agora = new Date();
            const hojeCompleto = `${String(agora.getDate()).padStart(2, '0')}/${String(agora.getMonth() + 1).padStart(2, '0')}/${agora.getFullYear()}`;

            try {
                const response = await fetch(`${spreadsheetUrl}&timestamp=${new Date().getTime()}`);
                const csv = await response.text();
                const linhas = csv.split(/\r?\n/).map(l => l.split(/[;,]/)); // Aceita vírgula ou ponto e vírgula
                
                if (linhas.length < 2) return;

                // Limpa o cabeçalho para comparação
                const cabecalho = linhas[0].map(c => c.replace(/"/g, '').trim().toUpperCase());
                
                // Localiza os índices por palavras-chave simples
                const idxData = cabecalho.findIndex(c => c.includes("DATA"));
                const idxVol = cabecalho.findIndex(c => c.includes("VOLUME"));
                const idxDrop = cabecalho.findIndex(c => c.includes("DROP"));
                const idxOcp = cabecalho.findIndex(c => c.includes("OCUPA"));
                const idxNf = cabecalho.findIndex(c => c.includes("NF"));

                let dadosDeHoje = null;

                // Procura a linha de hoje
                for (let i = 1; i < linhas.length; i++) {
                    if (linhas[i][idxData] && linhas[i][idxData].includes(hojeCompleto)) {
                        dadosDeHoje = linhas[i];
                        break;
                    }
                }

                if (dadosDeHoje) {
                    const extrair = (idx) => {
                        let v = dadosDeHoje[idx] ? dadosDeHoje[idx].replace(/"/g, '').trim() : "-";
                        return v === "" ? "-" : v;
                    };

                    displays.vol.textContent = extrair(idxVol);
                    displays.drop.textContent = extrair(idxDrop);
                    displays.ocp.textContent = extrair(idxOcp);
                    displays.nf.textContent = extrair(idxNf);

                    const horaSinc = new Date().toLocaleTimeString('pt-BR');
                    statuses.forEach(s => {
                        s.textContent = `Sincronizado: ${horaSinc}`;
                        s.style.color = "#00ced1";
                    });
                } else {
                    statuses.forEach(s => {
                        s.textContent = `Aguardando dado de hoje (${hojeCompleto})`;
                        s.style.color = "orange";
                    });
                }

            } catch (err) {
                console.error(err);
                statuses.forEach(s => {
                    s.textContent = "Erro na conexão...";
                    s.style.color = "red";
                });
            }
        }

        setInterval(atualizarRelogio, 1000);
        atualizarRelogio();
        fetchPlanilha();
        setInterval(fetchPlanilha, 10000); 
    </script>
