<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Controle - Base</title>
    <style>
        body {
            background-color: #0b192c;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            font-weight: bold;
            overflow-x: hidden;
        }

        #cabecalho-informativo {
            position: absolute;
            top: 30px;
            left: 30px;
            display: inline-block;
            line-height: 1;
        }

        #relogio {
            color: #00ced1; 
            font-size: 5.5em; 
            display: block;
            letter-spacing: -2px;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        #data-atual {
            color: #a0aec0; 
            font-size: 1.35em; 
            display: block;
            margin-top: 8px;
            text-transform: capitalize;
            font-weight: normal; 
        }

        /* Container ajustado para alinhar cards à esquerda */
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-start; /* Alinhado à esquerda */
            align-items: flex-start;
            padding: 240px 50px 50px 50px; /* Espaço para o relógio no topo */
            gap: 20px;
        }

        /* Card um pouco menor para caberem mais na linha */
        .card {
            background-color: #1a365d;
            border: 3px solid #00ced1;
            border-radius: 30px; 
            width: 320px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .card h3 {
            margin-top: 0;
            color: #a0aec0;
            font-size: 1em;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            height: 40px; /* Mantém títulos alinhados */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .valor-volume {
            font-size: 4em;
            color: #ffffff;
            display: block;
            margin-bottom: 5px;
        }

        #msg-status {
            font-size: 0.75em;
            color: #00ced1;
            margin-top: 10px;
            font-weight: normal;
        }
    </style>
</head>
<body>

    <div id="cabecalho-informativo">
        <span id="relogio">00:00:00</span>
        <span id="data-atual">Carregando...</span>
    </div>

    <div class="container">
        <div id="cards-container">
            <div class="card">
                <h3>VOLUME EXPEDIDO (KG)</h3>
                <span class="valor-volume" id="volume-display">...</span>
                <div id="msg-status">Sincronizando...</div>
            </div>
        </div>
    </div>

    <script>
        function atualizarTempo() {
            const agora = new Date();
            const opHora = { timeZone: 'America/Sao_Paulo', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            const opData = { timeZone: 'America/Sao_Paulo', day: '2-digit', month: 'long', weekday: 'long', year: 'numeric' };
            
            document.getElementById('relogio').textContent = agora.toLocaleTimeString('pt-BR', opHora);
            document.getElementById('data-atual').textContent = agora.toLocaleDateString('pt-BR', opData);
            
            return agora.toLocaleDateString('pt-BR', {timeZone: 'America/Sao_Paulo', day: '2-digit', month: '2-digit', year: 'numeric'});
        }

        const sheetURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRKxl-zvgTVOsrSbHGyDemOfdGq_aTVlkODbyfzlbXdeQGo1SOCipFqc3Dlh6hHl7uAsnMf0WgOX4Bt/pub?output=csv';

        async function carregarDados() {
            const volumeDisplay = document.getElementById('volume-display');
            const statusDisplay = document.getElementById('msg-status');
            const dataHojeStr = atualizarTempo(); 

            try {
                const response = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(sheetURL + '&t=' + new Date().getTime()));
                const json = await response.json();
                const csvTexto = json.contents;
                
                // Divide as linhas e remove possíveis espaços extras
                const linhas = csvTexto.split(/\r?\n/).map(l => l.trim());
                
                let volumeEncontrado = "-";
                let encontrouData = false;

                for (let i = 1; i < linhas.length; i++) {
                    // Regex para separar por vírgula mas respeitar aspas (caso o número tenha vírgula decimal)
                    const colunas = linhas[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    
                    const dataPlanilha = colunas[0] ? colunas[0].replace(/^"|"$/g, '').trim() : "";
                    
                    if (dataPlanilha === dataHojeStr) {
                        let valorRaw = colunas[2] ? colunas[2].replace(/^"|"$/g, '').trim() : "";
                        
                        // Limpeza: remove pontos de milhar e substitui vírgula decimal por ponto se necessário
                        // Mas para exibição, vamos apenas garantir que não venha vazio
                        volumeEncontrado = (valorRaw === "" || valorRaw === "0") ? "-" : valorRaw;
                        
                        encontrouData = true;
                        break;
                    }
                }

                volumeDisplay.textContent = volumeEncontrado;
                statusDisplay.textContent = encontrouData ? "Atualizado Agora" : "Data " + dataHojeStr + " não encontrada";
                statusDisplay.style.color = encontrouData ? "#00ced1" : "orange";

            } catch (e) {
                console.error(e);
                statusDisplay.textContent = "Erro na conexão";
                statusDisplay.style.color = "red";
            }
        }

        setInterval(atualizarTempo, 1000);
        atualizarTempo();
        carregarDados();
        setInterval(carregarDados, 30000);
    </script>
</body>
</html>
