<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Logístico</title>
    <style>
        body {
            background-color: #0b192c;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 2vh 2vw;
            font-weight: bold;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            gap: 2vh;
        }

        header { flex-shrink: 0; }

        #relogio {
            color: #00ced1; 
            font-size: clamp(3em, 6vw, 4em);
            display: block;
            line-height: 1;
        }

        #data-atual {
            color: #a0aec0; 
            font-size: clamp(0.8em, 1.2vw, 1em);
            text-transform: capitalize;
            font-weight: normal;
        }

        .row {
            display: flex;
            gap: 1.5vw;
            width: 100%;
        }

        /* Primeira linha ocupa mais espaço que a segunda */
        .row-kpis { flex: 2; }
        .row-frota { flex: 1.2; }

        .card {
            background-color: #1a365d;
            border: 2px solid #00ced1;
            border-radius: 20px;
            flex: 1 1 0;
            min-width: 0;
            padding: 1.5vh 1vw;
            text-align: center;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card h3 {
            margin: 0 0 1vh 0;
            color: #a0aec0;
            font-size: clamp(0.65em, 1vw, 0.8em);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Estilo para o Card Dividido de Frota */
        .card-split {
            flex: 1; /* Ocupa o lado esquerdo na segunda linha */
            display: flex;
            flex-direction: column;
        }

        .split-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex: 1;
        }

        .split-item {
            flex: 1;
            border-right: 1px solid rgba(0, 206, 209, 0.3);
        }

        .split-item:last-child { border-right: none; }

        .split-label {
            font-size: clamp(0.55em, 0.8vw, 0.7em);
            color: #a0aec0;
            margin-bottom: 5px;
        }

        .valor {
            font-size: clamp(1.8em, 4vw, 3.2em);
            color: #ffffff;
            display: block;
        }

        .valor-small { font-size: clamp(1.5em, 3vw, 2.5em); }

        .status-label {
            font-size: clamp(0.5em, 0.8vw, 0.6em);
            margin-top: 1vh;
            font-weight: normal;
            color: #00ced1;
        }
    </style>
</head>
<body>

    <header>
        <span id="relogio">00:00:00</span>
        <span id="data-atual">Carregando...</span>
    </header>

    <div class="row row-kpis">
        <div class="card">
            <h3>VOLUME EXPEDIDO (KG) - HOJE</h3>
            <span class="valor" id="vol-valor">-</span>
            <div class="status-label" id="status-vol">Sincronizando...</div>
        </div>
        <div class="card">
            <h3>DROPSIZE (KG) - HOJE</h3>
            <span class="valor" id="drop-valor">-</span>
            <div class="status-label" id="status-drop">Sincronizando...</div>
        </div>
        <div class="card">
            <h3>OCUPAÇÃO (%) - HOJE</h3>
            <span class="valor" id="ocp-valor">-</span>
            <div class="status-label" id="status-ocp">Sincronizando...</div>
        </div>
        <div class="card">
            <h3>NF'S (QTD) - HOJE</h3>
            <span class="valor" id="nf-valor">-</span>
            <div class="status-label" id="status-nf">Sincronizando...</div>
        </div>
    </div>

    <div class="row row-frota">
        <div class="card card-split">
            <h3>FROTA PRÓPRIA ENTREGA (QTD) - HOJE</h3>
            <div class="split-container">
                <div class="split-item">
                    <div class="split-label">TOTAL</div>
                    <span class="valor valor-small" id="f-total">-</span>
                </div>
                <div class="split-item">
                    <div class="split-label">PARADOS</div>
                    <span class="valor valor-small" id="f-parados">-</span>
                </div>
                <div class="split-item">
                    <div class="split-label">DISPONIBILIDADE</div>
                    <span class="valor valor-small" id="f-dispo">-</span>
                </div>
                <div class="split-item">
                    <div class="split-label">UTILIZADOS</div>
                    <span class="valor valor-small" id="f-util">-</span>
                </div>
            </div>
            <div class="status-label" id="status-frota">Sincronizando...</div>
        </div>
        
        <div style="flex:1; display:flex; gap:1.5vw;">
            </div>
    </div>

    <script>
        function atualizarRelogio() {
            const agora = new Date();
            const fHora = { timeZone: 'America/Sao_Paulo', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            const fData = { timeZone: 'America/Sao_Paulo', day: '2-digit', month: 'long', weekday: 'long', year: 'numeric' };
            document.getElementById('relogio').textContent = agora.toLocaleTimeString('pt-BR', fHora);
            document.getElementById('data-atual').textContent = agora.toLocaleDateString('pt-BR', fData);
        }

        const spreadsheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRKxl-zvgTVOsrSbHGyDemOfdGq_aTVlkODbyfzlbXdeQGo1SOCipFqc3Dlh6hHl7uAsnMf0WgOX4Bt/pub?output=csv';

        async function fetchPlanilha() {
            const agora = new Date();
            const hojeCompleto = `${String(agora.getDate()).padStart(2, '0')}/${String(agora.getMonth() + 1).padStart(2, '0')}/${agora.getFullYear()}`;

            try {
                const response = await fetch(`${spreadsheetUrl}&timestamp=${new Date().getTime()}`);
                if (!response.ok) throw new Error("Erro na resposta");
                
                const csv = await response.text();
                const linhas = csv.split(/\r?\n/);
                if (linhas.length === 0) return;

                const separador = linhas[0].includes(';') ? ';' : ',';
                const cabecalho = linhas[0].split(separador).map(txt => txt.replace(/"/g, '').trim().toUpperCase());
                
                // Mapeamento de Índices
                const idxData = cabecalho.indexOf("DATA");
                const idxs = {
                    vol: cabecalho.indexOf("VOLUME EXPEDIDO (KG)"),
                    drop: cabecalho.indexOf("DROPSIZE (KG)"),
                    ocp: cabecalho.indexOf("OCUPAÇÃO (%)"),
                    nf: cabecalho.findIndex(txt => txt.includes("NF") && txt.includes("QTD")),
                    // Novos índices de Frota
                    fTotal: cabecalho.indexOf("FROTA PRÓPRIA ENTREGA TOTAL (QTD)"),
                    fParados: cabecalho.indexOf("FROTA PRÓPRIA ENTREGA PARADOS (QTD)"),
                    fDispo: cabecalho.indexOf("FROTA PRÓPRIA ENTREGA DISPONIBILIDADE (QTD)"),
                    fUtil: cabecalho.indexOf("FROTA PRÓPRIA ENTREGA UTILIZADOS (QTD)")
                };

                let achouData = false;
                let valores = { vol: "-", drop: "-", ocp: "-", nf: "-", fTotal: "-", fParados: "-", fDispo: "-", fUtil: "-" };

                if (idxData !== -1) {
                    for (let i = 1; i < linhas.length; i++) {
                        const colunas = linhas[i].split(separador);
                        let dataPlanilha = colunas[idxData] ? colunas[idxData].replace(/"/g, '').trim() : "";

                        if (dataPlanilha.includes(hojeCompleto)) {
                            achouData = true;
                            const limpar = (idx) => {
                                if (idx === -1 || !colunas[idx]) return "-";
                                let v = colunas[idx].replace(/"/g, '').trim();
                                return (v === "" || v === "null" || v === "#N/A") ? "-" : v;
                            };

                            Object.keys(idxs).forEach(key => {
                                if(key !== 'idxData') valores[key] = limpar(idxs[key]);
                            });
                            break;
                        }
                    }
                }

                // Atualizar DOM
                document.getElementById('vol-valor').textContent = valores.vol;
                document.getElementById('drop-valor').textContent = valores.drop;
                document.getElementById('ocp-valor').textContent = valores.ocp;
                document.getElementById('nf-valor').textContent = valores.nf;
                document.getElementById('f-total').textContent = valores.fTotal;
                document.getElementById('f-parados').textContent = valores.fParados;
                document.getElementById('f-dispo').textContent = valores.fDispo;
                document.getElementById('f-util').textContent = valores.fUtil;

                const horaSinc = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
                const statusIds = ['status-vol', 'status-drop', 'status-ocp', 'status-nf', 'status-frota'];

                statusIds.forEach(id => {
                    const el = document.getElementById(id);
                    if (achouData) {
                        el.textContent = `Sincronizado: ${horaSinc}`;
                        el.style.color = "#00ced1";
                    } else {
                        el.textContent = `Aguardando dado de hoje (${hojeCompleto})`;
                        el.style.color = "orange";
                    }
                });

            } catch (err) {
                console.error("Erro:", err);
            }
        }

        setInterval(atualizarRelogio, 1000);
        atualizarRelogio();
        fetchPlanilha();
        setInterval(fetchPlanilha, 7000); 
    </script>
</body>
</html>
