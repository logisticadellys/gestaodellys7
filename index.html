<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Logístico</title>
    <style>
        body {
            background-color: #0b192c;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 30px;
            font-weight: bold;
            overflow: hidden;
        }

        header {
            margin-bottom: 20px;
            line-height: 1.1;
        }

        #relogio {
            color: #00ced1; 
            font-size: 4.5em;
            display: block;
        }

        #data-atual {
            color: #a0aec0; 
            font-size: 1.1em;
            text-transform: capitalize;
            font-weight: normal;
        }

        .grid-cards {
            display: flex;
            gap: 15px;
            justify-content: flex-start;
            margin-top: 10px;
        }

        .card {
            background-color: #1a365d;
            border: 2px solid #00ced1;
            border-radius: 20px;
            width: 250px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
        }

        .card h3 {
            margin: 0 0 10px 0;
            color: #a0aec0;
            font-size: 1.1em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .valor {
            font-size: 3em;
            color: #ffffff;
            display: block;
        }

        #status {
            font-size: 0.65em;
            margin-top: 8px;
            font-weight: normal;
            color: #00ced1;
        }
    </style>
</head>
<body>

    <header>
        <span id="relogio">00:00:00</span>
        <span id="data-atual">Carregando...</span>
    </header>

    <div class="grid-cards">
        <div class="card">
            <h3>VOLUME EXPEDIDO (KG)</h3>
            <span class="valor" id="vol-valor">-</span>
            <div id="status">Buscando dados...</div>
        </div>
    </div>

    <script>
        function atualizarRelogio() {
            const agora = new Date();
            const fHora = { timeZone: 'America/Sao_Paulo', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            const fData = { timeZone: 'America/Sao_Paulo', day: '2-digit', month: 'long', weekday: 'long', year: 'numeric' };
            document.getElementById('relogio').textContent = agora.toLocaleTimeString('pt-BR', fHora);
            document.getElementById('data-atual').textContent = agora.toLocaleDateString('pt-BR', fData);
            
            // Formatos para comparação (26/03/2026 e 26/03)
            const dia = agora.toLocaleDateString('pt-BR', {day: '2-digit'});
            const mes = agora.toLocaleDateString('pt-BR', {month: '2-digit'});
            const ano = agora.getFullYear();
            
            return {
                completo: `${dia}/${mes}/${ano}`,
                curto: `${dia}/${mes}`
            };
        }

        const spreadsheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRKxl-zvgTVOsrSbHGyDemOfdGq_aTVlkODbyfzlbXdeQGo1SOCipFqc3Dlh6hHl7uAsnMf0WgOX4Bt/pub?output=csv';

        async function fetchPlanilha() {
            const display = document.getElementById('vol-valor');
            const status = document.getElementById('status');
            const datasHoje = atualizarRelogio(); 

            try {
                // AllOrigins com timestamp para garantir que pegue a mudança na planilha
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(spreadsheetUrl + '&t=' + Date.now())}`);
                const data = await response.json();
                const csv = data.contents;
                
                const linhas = csv.split(/\r?\n/);
                let achou = false;

                for (let i = 1; i < linhas.length; i++) {
                    const separador = linhas[i].includes(';') ? ';' : ',';
                    const colunas = linhas[i].split(separador);
                    
                    // Limpa a célula da data (remove aspas e espaços)
                    let dataPlanilha = colunas[0] ? colunas[0].replace(/"/g, '').trim() : "";

                    // Busca Flexível: confere se a célula contém "26/03/2026" OU "26/03"
                    if (dataPlanilha.includes(datasHoje.completo) || dataPlanilha.includes(datasHoje.curto)) {
                        // Coluna C (Índice 2)
                        let valorC = colunas[2] ? colunas[2].replace(/"/g, '').trim() : "";
                        
                        display.textContent = (valorC === "" || valorC === "0") ? "-" : valorC;
                        status.textContent = "Sincronizado";
                        status.style.color = "#00ced1";
                        achou = true;
                        break;
                    }
                }

                if (!achou) {
                    display.textContent = "-";
                    status.textContent = "Data " + datasHoje.completo + " não localizada";
                    status.style.color = "orange";
                }

            } catch (err) {
                status.textContent = "Erro de conexão - Tentando novamente";
                status.style.color = "#ff4d4d";
            }
        }

        setInterval(atualizarRelogio, 1000);
        atualizarRelogio();
        
        // Busca inicial
        fetchPlanilha();
        
        // Atualização automática a cada 30 segundos
        setInterval(fetchPlanilha, 30000); 
    </script>
</body>
</html>
