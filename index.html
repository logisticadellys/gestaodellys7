<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Controle - Base</title>
    <style>
        body {
            background-color: #0b192c;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            font-weight: bold;
        }

        /* Mantendo seu cabeçalho no canto esquerdo */
        #cabecalho-informativo {
            position: absolute;
            top: 30px;
            left: 30px;
            display: inline-block;
            line-height: 1;
        }

        #relogio {
            color: #00ced1; 
            font-size: 5.5em; 
            display: block;
            letter-spacing: -2px;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        #data-atual {
            color: #a0aec0; 
            font-size: 1.35em; 
            display: block;
            margin-top: 8px;
            text-transform: capitalize;
            font-weight: normal; 
            width: 100%;
        }

        /* Container centralizado para o Card */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Centraliza verticalmente na tela */
            padding: 20px;
        }

        /* O Quadrado arredondado */
        .card {
            background-color: #1a365d;
            border: 3px solid #00ced1;
            border-radius: 40px; /* Bem arredondado como pediu */
            width: 400px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }

        .card h3 {
            margin-top: 0;
            color: #a0aec0;
            font-size: 1.2em;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .valor-volume {
            font-size: 4em;
            color: #ffffff;
            display: block;
            margin-bottom: 10px;
        }

        #status-carga {
            font-size: 0.9em;
            color: #00ced1;
            font-weight: normal;
        }

        #loading {
            font-size: 1.2em;
            color: #00ced1;
        }
    </style>
</head>
<body>

    <div id="cabecalho-informativo">
        <span id="relogio">00:00:00</span>
        <span id="data-atual">Carregando data...</span>
    </div>

    <div class="container" id="cards-container">
        <div id="loading">Buscando Volume de Hoje...</div>
    </div>

    <script>
        function atualizarTempo() {
            const agora = new Date();
            const opHora = { timeZone: 'America/Sao_Paulo', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            const opData = { timeZone: 'America/Sao_Paulo', day: '2-digit', month: 'long', weekday: 'long', year: 'numeric' };
            
            document.getElementById('relogio').textContent = agora.toLocaleTimeString('pt-BR', opHora);
            document.getElementById('data-atual').textContent = agora.toLocaleDateString('pt-BR', opData);
            
            // Retorna a data no formato DD/MM/YYYY para comparar com a Coluna A
            return agora.toLocaleDateString('pt-BR', {timeZone: 'America/Sao_Paulo', day: '2-digit', month: '2-digit', year: 'numeric'});
        }

        const sheetURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRKxl-zvgTVOsrSbHGyDemOfdGq_aTVlkODbyfzlbXdeQGo1SOCipFqc3Dlh6hHl7uAsnMf0WgOX4Bt/pub?output=csv';

        async function carregarDados() {
            const container = document.getElementById('cards-container');
            const dataHoje = atualizarTempo(); 

            try {
                const proxyURL = 'https://api.allorigins.win/get?url=' + encodeURIComponent(sheetURL + '&cache=' + new Date().getTime());
                const response = await fetch(proxyURL);
                const data = await response.json();
                const csvTexto = data.contents;
                const linhas = csvTexto.split(/\r?\n/);
                
                let volumeHoje = "---";

                // Começa no 1 para pular o cabeçalho (Data, Dia da Semana, Volume...)
                for (let i = 1; i < linhas.length; i++) {
                    const colunas = linhas[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    
                    // Se a Coluna A (Data) for igual a data de hoje
                    if (colunas[0] && colunas[0].trim() === dataHoje) {
                        // Pega a Coluna C (Volume Expedido)
                        volumeHoje = colunas[2] ? colunas[2].replace(/^"|"$/g, '').trim() : "0";
                        break; 
                    }
                }

                container.innerHTML = `
                    <div class="card">
                        <h3>VOLUME EXPEDIDO (KG)</h3>
                        <span class="valor-volume">${volumeHoje}</span>
                        <div id="status-carga">Sincronizado com a Base</div>
                    </div>
                `;

            } catch (e) {
                container.innerHTML = '<p>Erro ao atualizar dados.</p>';
            }
        }

        setInterval(atualizarTempo, 1000);
        atualizarTempo();
        carregarDados();
        setInterval(carregarDados, 40000); // Atualiza a cada 40 segundos
    </script>
</body>
</html>
