<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Logístico</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        body { background-color: #0b192c; color: #ffffff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 1.2vh 1.2vw; font-weight: bold; overflow: hidden; height: 100vh; display: flex; flex-direction: column; box-sizing: border-box; gap: 2.5vh; }
        header { flex-shrink: 0; position: relative; display: flex; align-items: center; justify-content: center; padding: 1vh 0; border-bottom: 1px solid rgba(46, 204, 113, 0.2); min-height: 8vh; }
        .logo-img { position: absolute; left: 0; height: clamp(40px, 6vh, 60px); width: auto; }
        .controles-painel { position: absolute; right: 0; display: flex; align-items: center; gap: 12px; top: 50%; transform: translateY(-50%); }
        h1 { margin: 0; font-size: clamp(1.2rem, 3.5vh, 1.8rem); text-transform: uppercase; letter-spacing: 2px; color: #2ecc71; text-shadow: 0 0 10px rgba(46, 204, 113, 0.3); }
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr); gap: 2.5vh; flex-grow: 1; min-height: 0; }
        .chart-box { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 1.5vh; display: flex; flex-direction: column; position: relative; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3); }
        .canvas-container { flex-grow: 1; position: relative; min-height: 0; width: 100%; }
        .loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b192c; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; transition: opacity 0.5s; }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(46, 204, 113, 0.1); border-top-color: #2ecc71; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        select { background: #1e293b; color: white; border: 1px solid #2ecc71; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>CARREGANDO DADOS...</p>
    </div>

    <header>
        <img src="https://i.ibb.co/99m6YpGv/629676e6-df02-4660-9118-09503ed32f22.png" alt="Logo" class="logo-img">
        <h1 id="titulo-painel">PAINEL DE OCUPAÇÃO E PRODUTIVIDADE</h1>
        <div class="controles-painel">
            <select id="select-ano" onchange="fetchPlanilha()">
                <option value="2026" selected>2026</option>
                <option value="2025">2025</option>
            </select>
        </div>
    </header>

    <div class="grid-container">
        <div class="chart-box">
            <div class="canvas-container"><canvas id="chartVolumeMensal"></canvas></div>
        </div>
        <div class="chart-box">
            <div class="canvas-container"><canvas id="chartOcupacaoMensal"></canvas></div>
        </div>
        <div class="chart-box">
            <div class="canvas-container"><canvas id="chartVolumeDiario"></canvas></div>
        </div>
        <div class="chart-box">
            <div class="canvas-container"><canvas id="chartOcupacaoDiario"></canvas></div>
        </div>
    </div>

    <script>
        Chart.register(ChartDataLabels);

        let charts = {};
        const SHEET_ID = '1ZpIdX34lC6xun7T6v9-4jW9m9K9vQ_Q9-uK9-uK9-uK'; // Substitua pelo seu ID real
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/1B-q7t3H7xN2vj5zN7-0P_qZz-N8T0W7p0G0K7N7k-M0/export?format=csv&gid=0`;

        function converter(val) {
            if (!val || val.trim() === "" || val === "-") return null;
            let n = parseFloat(val.replace(/\./g, '').replace(',', '.').replace('%', ''));
            return isNaN(n) ? null : n;
        }

        async function fetchPlanilha() {
            try {
                const response = await fetch(SHEET_URL);
                const data = await response.text();
                const linhas = data.split('\n').map(l => l.split(','));
                const cabecalho = linhas[0].map(c => c.trim().toUpperCase());

                const idxData = cabecalho.indexOf("DATA");
                const idxVol = cabecalho.indexOf("VOLUME (KG)");
                const idxOcup = cabecalho.indexOf("OCUPAÇÃO (%)");
                const idxMetaOcup = cabecalho.indexOf("META OCUPAÇÃO (%)");

                const anoSelecionado = parseInt(document.getElementById('select-ano').value);

                // Acumuladores Mensais
                let acumuladoVolMensal = new Array(12).fill(0);
                let somaOcupMensal = new Array(12).fill(0);
                let contOcupMensal = new Array(12).fill(0);
                let somaMetaMensal = new Array(12).fill(0);
                let contMetaMensal = new Array(12).fill(0);

                // Dados Diários (Últimos 30 dias do ano selecionado)
                let dadosDiarios = [];

                for (let i = 1; i < linhas.length; i++) {
                    let colunas = linhas[i];
                    if (colunas.length < cabecalho.length) continue;

                    let dataPlanilha = colunas[idxData];
                    let valVol = converter(colunas[idxVol]);
                    let valOcup = converter(colunas[idxOcup]);
                    let valMeta = converter(colunas[idxMetaOcup]);

                    let partesData = dataPlanilha.split('/');
                    if (partesData.length === 3) {
                        let dP = parseInt(partesData[0]);
                        let mP = parseInt(partesData[1]);
                        let aP = parseInt(partesData[2]);

                        if (aP === anoSelecionado) {
                            let mIdx = mP - 1;

                            // AJUSTE NA LÓGICA DA META:
                            // Verifica se existe valor e se é maior que zero
                            if (valMeta !== null && valMeta > 0) {
                                // Se o valor for decimal (ex: 0.60), converte para 60
                                let metaTratada = valMeta < 1 ? valMeta * 100 : valMeta;
                                somaMetaMensal[mIdx] += metaTratada;
                                contMetaMensal[mIdx]++;
                            }

                            if (valVol !== null) acumuladoVolMensal[mIdx] += valVol;
                            if (valOcup !== null && valOcup > 0) {
                                somaOcupMensal[mIdx] += valOcup;
                                contOcupMensal[mIdx]++;
                            }

                            dadosDiarios.push({
                                label: `${dP}/${mP}`,
                                volume: valVol || 0,
                                ocupacao: valOcup || 0,
                                meta: (valMeta < 1 && valMeta > 0) ? valMeta * 100 : (valMeta || 0),
                                sortKey: aP * 10000 + mP * 100 + dP
                            });
                        }
                    }
                }

                // Processar Médias Mensais
                let mediasOcupMensal = somaOcupMensal.map((s, i) => contOcupMensal[i] > 0 ? s / contOcupMensal[i] : 0);
                let mediasMetaMensal = somaMetaMensal.map((s, i) => contMetaMensal[i] > 0 ? s / contMetaMensal[i] : 0);

                // Diários: pegar últimos 30 registros do ano
                dadosDiarios.sort((a, b) => a.sortKey - b.sortKey);
                let ultimosDiarios = dadosDiarios.slice(-30);

                renderCharts(
                    acumuladoVolMensal, 
                    mediasOcupMensal, 
                    mediasMetaMensal, 
                    ultimosDiarios
                );

                document.getElementById('loading').style.opacity = '0';
                setTimeout(() => document.getElementById('loading').style.display = 'none', 500);

            } catch (error) {
                console.error("Erro ao carregar dados:", error);
            }
        }

        function renderCharts(volM, ocupM, metaM, diarios) {
            const meses = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
            const options = {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    datalabels: { color: '#fff', font: { weight: 'bold' } }
                },
                scales: {
                    x: { ticks: { color: '#a0aec0' }, grid: { display: false } },
                    y: { ticks: { color: '#a0aec0' }, grid: { color: 'rgba(255,255,255,0.05)' } }
                }
            };

            // 1. VOLUME MENSAL
            createOrUpdateChart('chartVolumeMensal', 'bar', meses, [
                { data: volM, backgroundColor: '#3498db', borderRadius: 5 }
            ], 'VOLUME MENSAL (KG)', false);

            // 2. OCUPAÇÃO MENSAL
            createOrUpdateChart('chartOcupacaoMensal', 'bar', meses, [
                { 
                    data: ocupM, 
                    backgroundColor: ocupM.map((v, i) => v >= metaM[i] ? '#2ecc71' : '#e74c3c'),
                    borderRadius: 5,
                    order: 2
                },
                {
                    type: 'line',
                    label: 'META',
                    data: metaM.map(v => v > 0 ? v : null),
                    borderColor: '#ffff00',
                    borderDash: [5, 5],
                    pointRadius: 0,
                    fill: false,
                    order: 1
                }
            ], 'OCUPAÇÃO (%) - MENSAL (' + document.getElementById('select-ano').value + ')', true);

            // 3. VOLUME DIÁRIO
            createOrUpdateChart('chartVolumeDiario', 'bar', diarios.map(d => d.label), [
                { data: diarios.map(d => d.volume), backgroundColor: '#3498db', borderRadius: 3 }
            ], 'VOLUME DIÁRIO (ÚLT. 30 DIAS)', false);

            // 4. OCUPAÇÃO DIÁRIA
            createOrUpdateChart('chartOcupacaoDiario', 'bar', diarios.map(d => d.label), [
                { 
                    data: diarios.map(d => d.ocupacao), 
                    backgroundColor: diarios.map(d => d.ocupacao >= d.meta ? '#2ecc71' : '#e74c3c'),
                    borderRadius: 3,
                    order: 2
                },
                {
                    type: 'line',
                    data: diarios.map(d => d.meta),
                    borderColor: '#ffff00',
                    borderDash: [5, 5],
                    pointRadius: 0,
                    fill: false,
                    order: 1
                }
            ], 'OCUPAÇÃO DIÁRIA (%)', true);
        }

        function createOrUpdateChart(id, type, labels, datasets, titulo, isPerc) {
            if (charts[id]) charts[id].destroy();
            
            charts[id] = new Chart(document.getElementById(id), {
                type: type,
                data: { labels, datasets },
                options: {
                    ...getCommonOptions(titulo, true, isPerc),
                    plugins: {
                        ...getCommonOptions(titulo, true, isPerc).plugins,
                        legend: id.includes('Ocupacao') ? {
                            display: true,
                            position: 'bottom',
                            labels: {
                                color: '#ffffff',
                                font: { size: 10, weight: 'bold' },
                                boxWidth: 12,
                                generateLabels: () => [
                                    { text: 'META', fillStyle: '#ffff00', strokeStyle: '#ffff00', lineWidth: 2 },
                                    { text: 'META BATIDA', fillStyle: '#2ecc71' },
                                    { text: 'META NÃO BATIDA', fillStyle: '#e74c3c' }
                                ]
                            }
                        } : { display: false }
                    }
                }
            });
        }

        function getCommonOptions(titulo, showDL, isPerc = false) {
            return {
                responsive: true,
                maintainAspectRatio: false,
                layout: { padding: { top: 20 } },
                plugins: {
                    datalabels: {
                        display: (context) => context.dataset.type !== 'line',
                        anchor: 'end',
                        align: 'top',
                        offset: -2,
                        color: '#ffffff',
                        font: { weight: 'bold', size: 10 },
                        formatter: (v) => v > 0 ? (isPerc ? v.toFixed(1) + '%' : v.toLocaleString('pt-BR')) : ''
                    },
                    title: { display: true, text: titulo, color: '#a0aec0', font: { size: 14 } }
                },
                scales: {
                    x: { ticks: { color: '#a0aec0', font: { size: 9 } }, grid: { display: false } },
                    y: { 
                        beginAtZero: true,
                        ticks: { color: '#a0aec0', font: { size: 9 } }, 
                        grid: { color: 'rgba(255,255,255,0.05)' } 
                    }
                }
            };
        }

        window.onload = fetchPlanilha;
        setInterval(fetchPlanilha, 300000); // Atualiza a cada 5 min
    </script>
</body>
</html>
