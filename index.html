<script>
        function atualizarRelogio() {
            const agora = new Date();
            const fHora = { timeZone: 'America/Sao_Paulo', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            const fData = { timeZone: 'America/Sao_Paulo', day: '2-digit', month: 'long', weekday: 'long', year: 'numeric' };
            document.getElementById('relogio').textContent = agora.toLocaleTimeString('pt-BR', fHora);
            document.getElementById('data-atual').textContent = agora.toLocaleDateString('pt-BR', fData);
            
            return agora.toLocaleDateString('pt-BR', {timeZone: 'America/Sao_Paulo', day: '2-digit', month: '2-digit'});
        }

        // URL da sua planilha publicada como CSV
        const urlOriginal = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRKxl-zvgTVOsrSbHGyDemOfdGq_aTVlkODbyfzlbXdeQGo1SOCipFqc3Dlh6hHl7uAsnMf0WgOX4Bt/pub?output=csv';

        async function fetchPlanilha() {
            const display = document.getElementById('vol-valor');
            const status = document.getElementById('status');
            const hojeReduzido = atualizarRelogio();

            try {
                // Adicionamos um timestamp para evitar cache do navegador
                const cacheBuster = Date.now();
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(urlOriginal)}&t=${cacheBuster}`;
                
                const resp = await fetch(proxyUrl);
                
                if (!resp.ok) throw new Error("Erro na resposta da rede");

                const json = await resp.json();
                const csv = json.contents;
                
                if (!csv) throw new Error("Conteúdo vazio");

                const linhas = csv.split('\n');
                let achou = false;

                for (let i = 1; i < linhas.length; i++) {
                    // Regex para lidar com vírgulas dentro de aspas (comum em CSVs)
                    const col = linhas[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    const dataPlanilha = col[0] ? col[0].replace(/"/g, '').trim() : "";

                    if (dataPlanilha.includes(hojeReduzido)) {
                        let v = col[2] ? col[2].replace(/"/g, '').trim() : "";
                        display.textContent = (v === "" || v === "0") ? "-" : v;
                        status.textContent = "Sincronizado";
                        status.style.color = "#00ced1";
                        achou = true;
                        break;
                    }
                }

                if (!achou) {
                    display.textContent = "-";
                    status.textContent = "Data " + hojeReduzido + " não encontrada";
                    status.style.color = "orange";
                }

            } catch (err) {
                console.error(err);
                status.textContent = "Erro de conexão. Tentando novamente...";
                status.style.color = "#ff4d4d";
                // Tenta reconectar em 5 segundos se falhar
                setTimeout(fetchPlanilha, 5000);
            }
        }

        setInterval(atualizarRelogio, 1000);
        atualizarRelogio();
        fetchPlanilha();
        
        // Atualiza a cada 30 segundos
        setInterval(fetchPlanilha, 30000); 
    </script>
