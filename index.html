<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Logístico</title>
    <style>
        body {
            background-color: #0b192c;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 40px;
            font-weight: bold;
        }

        /* Cabeçalho no topo esquerdo */
        header {
            margin-bottom: 50px;
            line-height: 1.1;
        }

        #relogio {
            color: #00ced1; 
            font-size: 5em; 
            display: block;
            text-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        #data-atual {
            color: #a0aec0; 
            font-size: 1.2em; 
            text-transform: capitalize;
            font-weight: normal;
        }

        /* Container que alinha os cards à esquerda */
        .grid-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, 280px); /* Define largura fixa dos cards */
            gap: 20px;
            justify-content: start; /* Alinha tudo à esquerda */
            margin-top: 20px;
        }

        .card {
            background-color: #1a365d;
            border: 2px solid #00ced1;
            border-radius: 25px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        .card h3 {
            margin: 0 0 15px 0;
            color: #a0aec0;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .valor {
            font-size: 3.5em;
            color: #ffffff;
            display: block;
        }

        #status {
            font-size: 0.7em;
            margin-top: 10px;
            font-weight: normal;
            color: #00ced1;
        }
    </style>
</head>
<body>

    <header>
        <span id="relogio">00:00:00</span>
        <span id="data-atual">Carregando...</span>
    </header>

    <div class="grid-cards">
        <div class="card">
            <h3>VOLUME EXPEDIDO (KG)</h3>
            <span class="valor" id="vol-valor">-</span>
            <div id="status">Sincronizando...</div>
        </div>
        </div>

    <script>
        function atualizarRelogio() {
            const agora = new Date();
            const fHora = { timeZone: 'America/Sao_Paulo', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            const fData = { timeZone: 'America/Sao_Paulo', day: '2-digit', month: 'long', weekday: 'long', year: 'numeric' };
            document.getElementById('relogio').textContent = agora.toLocaleTimeString('pt-BR', fHora);
            document.getElementById('data-atual').textContent = agora.toLocaleDateString('pt-BR', fData);
            return agora.toLocaleDateString('pt-BR', {timeZone: 'America/Sao_Paulo', day: '2-digit', month: '2-digit', year: 'numeric'});
        }

        const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRKxl-zvgTVOsrSbHGyDemOfdGq_aTVlkODbyfzlbXdeQGo1SOCipFqc3Dlh6hHl7uAsnMf0WgOX4Bt/pub?output=csv';

        async function fetchPlanilha() {
            const display = document.getElementById('vol-valor');
            const status = document.getElementById('status');
            const hoje = atualizarRelogio();

            try {
                // Usando um proxy diferente para evitar o erro de conexão
                const resp = await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}&t=${Date.now()}`);
                const csv = await resp.text();
                const linhas = csv.split('\n');
                
                let achou = false;

                for (let i = 1; i < linhas.length; i++) {
                    const col = linhas[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    const dataPlanilha = col[0] ? col[0].replace(/"/g, '').trim() : "";

                    if (dataPlanilha === hoje) {
                        const v = col[2] ? col[2].replace(/"/g, '').trim() : "";
                        display.textContent = (v === "" || v === "0") ? "-" : v;
                        status.textContent = "Atualizado agora";
                        status.style.color = "#00ced1";
                        achou = true;
                        break;
                    }
                }

                if (!achou) {
                    display.textContent = "-";
                    status.textContent = "Data não encontrada";
                    status.style.color = "orange";
                }

            } catch (err) {
                status.textContent = "Erro de conexão";
                status.style.color = "red";
            }
        }

        setInterval(atualizarRelogio, 1000);
        atualizarRelogio();
        fetchPlanilha();
        setInterval(fetchPlanilha, 40000); // Atualiza a cada 40s
    </script>
</body>
</html>
