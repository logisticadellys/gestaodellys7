<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Logístico</title>
    <style>
        body {
            background-color: #0b192c;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 2vh 2vw;
            font-weight: bold;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        header {
            margin-bottom: 2vh;
            flex-shrink: 0; /* Impede o header de encolher */
        }

        #relogio {
            color: #00ced1; 
            font-size: clamp(3em, 7vw, 4.5em);
            display: block;
            line-height: 1;
        }

        #data-atual {
            color: #a0aec0; 
            font-size: clamp(0.9em, 1.5vw, 1.1em);
            text-transform: capitalize;
            font-weight: normal;
        }

        .grid-cards {
            display: flex;
            gap: 1.5vw;
            flex: 1; /* Faz o container de cards ocupar o resto da tela */
            align-items: stretch; /* Garante que todos os cards tenham a mesma altura */
            width: 100%;
            box-sizing: border-box;
        }

        .card {
            background-color: #1a365d;
            border: 2px solid #00ced1;
            border-radius: 20px;
            /* O segredo da proporção: flex-basis 0 e flex-grow 1 força divisão igual */
            flex: 1 1 0; 
            min-width: 0;
            padding: 2vh 1vw;
            text-align: center;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card h3 {
            margin: 0 0 1.5vh 0;
            color: #a0aec0;
            font-size: clamp(0.7em, 1.1vw, 0.85em);
            text-transform: uppercase;
            letter-spacing: 1px;
            min-height: 3em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .valor {
            font-size: clamp(1.8em, 4.5vw, 3.5em);
            color: #ffffff;
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .status-label {
            font-size: clamp(0.5em, 0.9vw, 0.65em);
            margin-top: 1.5vh;
            font-weight: normal;
            color: #00ced1;
        }
    </style>
</head>
<body>

    <header>
        <span id="relogio">00:00:00</span>
        <span id="data-atual">Carregando...</span>
    </header>

    <div class="grid-cards" id="container-principal">
        <div class="card">
            <h3>VOLUME EXPEDIDO (KG) - HOJE</h3>
            <span class="valor" id="vol-valor">-</span>
            <div class="status-label" id="status-vol">Sincronizando...</div>
        </div>

        <div class="card">
            <h3>DROPSIZE (KG) - HOJE</h3>
            <span class="valor" id="drop-valor">-</span>
            <div class="status-label" id="status-drop">Sincronizando...</div>
        </div>

        <div class="card">
            <h3>OCUPAÇÃO (%) - HOJE</h3>
            <span class="valor" id="ocp-valor">-</span>
            <div class="status-label" id="status-ocp">Sincronizando...</div>
        </div>

        <div class="card">
            <h3>NF'S (QTD) - HOJE</h3>
            <span class="valor" id="nf-valor">-</span>
            <div class="status-label" id="status-nf">Sincronizando...</div>
        </div>
    </div>

    <script>
        function atualizarRelogio() {
            const agora = new Date();
            const fHora = { timeZone: 'America/Sao_Paulo', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            const fData = { timeZone: 'America/Sao_Paulo', day: '2-digit', month: 'long', weekday: 'long', year: 'numeric' };
            document.getElementById('relogio').textContent = agora.toLocaleTimeString('pt-BR', fHora);
            document.getElementById('data-atual').textContent = agora.toLocaleDateString('pt-BR', fData);
        }

        const spreadsheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRKxl-zvgTVOsrSbHGyDemOfdGq_aTVlkODbyfzlbXdeQGo1SOCipFqc3Dlh6hHl7uAsnMf0WgOX4Bt/pub?output=csv';

        async function fetchPlanilha() {
            const agora = new Date();
            const hojeCompleto = `${String(agora.getDate()).padStart(2, '0')}/${String(agora.getMonth() + 1).padStart(2, '0')}/${agora.getFullYear()}`;

            try {
                const response = await fetch(`${spreadsheetUrl}&timestamp=${new Date().getTime()}`);
                if (!response.ok) throw new Error("Erro na resposta");
                
                const csv = await response.text();
                const linhas = csv.split(/\r?\n/);
                if (linhas.length === 0) return;

                const separador = linhas[0].includes(';') ? ';' : ',';
                const cabecalho = linhas[0].split(separador).map(txt => txt.replace(/"/g, '').trim().toUpperCase());
                
                const idxData = cabecalho.indexOf("DATA");
                const idxVol = cabecalho.indexOf("VOLUME EXPEDIDO (KG)");
                const idxDrop = cabecalho.indexOf("DROPSIZE (KG)");
                const idxOcp = cabecalho.indexOf("OCUPAÇÃO (%)");
                const idxNf = cabecalho.findIndex(txt => txt.includes("NF") && txt.includes("QTD"));

                let achouData = false;
                let finalValores = { vol: "-", drop: "-", ocp: "-", nf: "-" };

                if (idxData !== -1) {
                    for (let i = 1; i < linhas.length; i++) {
                        const colunas = linhas[i].split(separador);
                        let dataPlanilha = colunas[idxData] ? colunas[idxData].replace(/"/g, '').trim() : "";

                        if (dataPlanilha.includes(hojeCompleto)) {
                            achouData = true;
                            
                            const limpar = (idx) => {
                                if (idx === -1 || !colunas[idx]) return "-";
                                let v = colunas[idx].replace(/"/g, '').trim();
                                return (v === "" || v === "null") ? "-" : v;
                            };

                            finalValores.vol = limpar(idxVol);
                            finalValores.drop = limpar(idxDrop);
                            finalValores.ocp = limpar(idxOcp);
                            finalValores.nf = limpar(idxNf);
                            break;
                        }
                    }
                }

                document.getElementById('vol-valor').textContent = finalValores.vol;
                document.getElementById('drop-valor').textContent = finalValores.drop;
                document.getElementById('ocp-valor').textContent = finalValores.ocp;
                document.getElementById('nf-valor').textContent = finalValores.nf;

                const horaSinc = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
                const statusIds = ['status-vol', 'status-drop', 'status-ocp', 'status-nf'];

                statusIds.forEach(id => {
                    const el = document.getElementById(id);
                    if (achouData) {
                        el.textContent = `Sincronizado: ${horaSinc}`;
                        el.style.color = "#00ced1";
                    } else {
                        el.textContent = `Aguardando dado de hoje (${hojeCompleto})`;
                        el.style.color = "orange";
                    }
                });

            } catch (err) {
                console.error("Erro:", err);
                ['status-vol', 'status-drop', 'status-ocp', 'status-nf'].forEach(id => {
                    const el = document.getElementById(id);
                    if (el) {
                        el.textContent = "Conexão instável...";
                        el.style.color = "#ff4d4d";
                    }
                });
            }
        }

        setInterval(atualizarRelogio, 1000);
        atualizarRelogio();
        fetchPlanilha();
        setInterval(fetchPlanilha, 7000); 
    </script>
</body>
</html>
