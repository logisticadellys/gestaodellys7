<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Logístico</title>
    <style>
        body {
            background-color: #0b192c;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 30px;
            font-weight: bold;
            overflow: hidden;
        }

        header {
            margin-bottom: 20px;
            line-height: 1.1;
        }

        #relogio {
            color: #00ced1; 
            font-size: 4.5em;
            display: block;
        }

        #data-atual {
            color: #a0aec0; 
            font-size: 1.1em;
            text-transform: capitalize;
            font-weight: normal;
        }

        .grid-cards {
            display: flex;
            gap: 15px;
            justify-content: space-between;
            margin-top: 10px;
            flex-wrap: nowrap; 
        }

        .card {
            background-color: #1a365d;
            border: 2px solid #00ced1;
            border-radius: 20px;
            flex: 1 1 0; /* Garante que os 4 cards tenham exatamente o mesmo tamanho */
            min-width: 200px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
        }

        .card h3 {
            margin: 0 0 10px 0;
            color: #a0aec0;
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 1px;
            min-height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .valor {
            font-size: 2.5em; /* Reduzi um pouco para caber os 4 confortavelmente */
            color: #ffffff;
            display: block;
        }

        .status-label {
            font-size: 0.55em;
            margin-top: 8px;
            font-weight: normal;
            color: #00ced1;
        }
    </style>
</head>
<body>

    <header>
        <span id="relogio">00:00:00</span>
        <span id="data-atual">Carregando...</span>
    </header>

    <div class="grid-cards">
        <div class="card">
            <h3>VOLUME EXPEDIDO (KG) - HOJE</h3>
            <span class="valor" id="vol-valor">-</span>
            <div class="status-label" id="status-vol">Sincronizando...</div>
        </div>

        <div class="card">
            <h3>DROPSIZE (KG) - HOJE</h3>
            <span class="valor" id="drop-valor">-</span>
            <div class="status-label" id="status-drop">Sincronizando...</div>
        </div>

        <div class="card">
            <h3>OCUPAÇÃO (%) - HOJE</h3>
            <span class="valor" id="ocp-valor">-</span>
            <div class="status-label" id="status-ocp">Sincronizando...</div>
        </div>

        <div class="card">
            <h3>NF's (QTD) - HOJE</h3>
            <span class="valor" id="nf-valor">-</span>
            <div class="status-label" id="status-nf">Sincronizando...</div>
        </div>
    </div>

    <script>
        function atualizarRelogio() {
            const agora = new Date();
            const fHora = { timeZone: 'America/Sao_Paulo', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            const fData = { timeZone: 'America/Sao_Paulo', day: '2-digit', month: 'long', weekday: 'long', year: 'numeric' };
            document.getElementById('relogio').textContent = agora.toLocaleTimeString('pt-BR', fHora);
            document.getElementById('data-atual').textContent = agora.toLocaleDateString('pt-BR', fData);
        }

        const spreadsheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRKxl-zvgTVOsrSbHGyDemOfdGq_aTVlkODbyfzlbXdeQGo1SOCipFqc3Dlh6hHl7uAsnMf0WgOX4Bt/pub?output=csv';

        async function fetchPlanilha() {
            const displays = {
                vol: document.getElementById('vol-valor'),
                drop: document.getElementById('drop-valor'),
                ocp: document.getElementById('ocp-valor'),
                nf: document.getElementById('nf-valor')
            };
            
            const statuses = {
                vol: document.getElementById('status-vol'),
                drop: document.getElementById('status-drop'),
                ocp: document.getElementById('status-ocp'),
                nf: document.getElementById('status-nf')
            };
            
            const agora = new Date();
            const dia = String(agora.getDate()).padStart(2, '0');
            const mes = String(agora.getMonth() + 1).padStart(2, '0');
            const ano = agora.getFullYear();
            const hojeCompleto = `${dia}/${mes}/${ano}`;

            try {
                const response = await fetch(`${spreadsheetUrl}&timestamp=${new Date().getTime()}`);
                if (!response.ok) throw new Error("Erro na resposta");
                
                const csv = await response.text();
                const linhas = csv.split(/\r?\n/);
                if (linhas.length === 0) return;

                const separador = linhas[0].includes(';') ? ';' : ',';
                const cabecalho = linhas[0].split(separador).map(txt => txt.replace(/"/g, '').trim().toUpperCase());
                
                const idxData = cabecalho.indexOf("DATA");
                const idxVol = cabecalho.indexOf("VOLUME EXPEDIDO (KG)");
                const idxDrop = cabecalho.indexOf("DROPSIZE (KG)");
                const idxOcp = cabecalho.indexOf("OCUPAÇÃO (%)");
                const idxNf = cabecalho.indexOf("NF’S (QTD)");

                let achouData = false;
                let valores = { vol: "-", drop: "-", ocp: "-", nf: "-" };

                if (idxData !== -1) {
                    for (let i = 1; i < linhas.length; i++) {
                        const colunas = linhas[i].split(separador);
                        let dataPlanilha = colunas[idxData] ? colunas[idxData].replace(/"/g, '').trim() : "";

                        if (dataPlanilha.includes(hojeCompleto)) {
                            achouData = true;
                            if (idxVol !== -1) valores.vol = colunas[idxVol]?.replace(/"/g, '').trim() || "-";
                            if (idxDrop !== -1) valores.drop = colunas[idxDrop]?.replace(/"/g, '').trim() || "-";
                            if (idxOcp !== -1) valores.ocp = colunas[idxOcp]?.replace(/"/g, '').trim() || "-";
                            if (idxNf !== -1) valores.nf = colunas[idxNf]?.replace(/"/g, '').trim() || "-";
                            break;
                        }
                    }
                }

                // Atualizar tela
                Object.keys(displays).forEach(key => displays[key].textContent = valores[key]);

                const horaSinc = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
                const statusElements = [statuses.vol, statuses.drop, statuses.ocp, statuses.nf];

                if (achouData) {
                    statusElements.forEach(s => {
                        s.textContent = `Sincronizado: ${horaSinc}`;
                        s.style.color = "#00ced1";
                    });
                } else {
                    statusElements.forEach(s => {
                        s.textContent = `Aguardando dado de hoje (${hojeCompleto})`;
                        s.style.color = "orange";
                    });
                }

            } catch (err) {
                console.error("Erro:", err);
                [statusVol, statusDrop, statusOcp, statusNf].forEach(s => {
                    if(s) {
                        s.textContent = "Conexão instável...";
                        s.style.color = "#ff4d4d";
                    }
                });
            }
        }

        setInterval(atualizarRelogio, 1000);
        atualizarRelogio();
        fetchPlanilha();
        setInterval(fetchPlanilha, 7000); 
    </script>
</body>
</html>
