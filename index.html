<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Logístico</title>
    <style>
        body {
            background-color: #0b192c;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 30px;
            font-weight: bold;
            overflow: hidden;
        }

        header {
            margin-bottom: 20px;
            line-height: 1.1;
        }

        #relogio {
            color: #00ced1; 
            font-size: 4.5em;
            display: block;
        }

        #data-atual {
            color: #a0aec0; 
            font-size: 1.1em;
            text-transform: capitalize;
            font-weight: normal;
        }

        .grid-cards {
            display: flex;
            gap: 15px;
            justify-content: flex-start;
            margin-top: 10px;
        }

        .card {
            background-color: #1a365d;
            border: 2px solid #00ced1;
            border-radius: 20px;
            width: 250px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
        }

        .card h3 {
            margin: 0 0 10px 0;
            color: #a0aec0;
            font-size: 1.1em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .valor {
            font-size: 3em;
            color: #ffffff;
            display: block;
        }

        #status {
            font-size: 0.65em;
            margin-top: 8px;
            font-weight: normal;
            color: #00ced1;
        }
    </style>
</head>
<body>

    <header>
        <span id="relogio">00:00:00</span>
        <span id="data-atual">Carregando...</span>
    </header>

    <div class="grid-cards">
        <div class="card">
            <h3>VOLUME EXPEDIDO (KG)</h3>
            <span class="valor" id="vol-valor">-</span>
            <div id="status">Sincronizando...</div>
        </div>
    </div>

    <script>
        // Memória para evitar o retrocesso de dados (Cache do Google)
        let valorAtualNaTela = 0;

        function atualizarRelogio() {
            const agora = new Date();
            const fHora = { timeZone: 'America/Sao_Paulo', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            const fData = { timeZone: 'America/Sao_Paulo', day: '2-digit', month: 'long', weekday: 'long', year: 'numeric' };
            document.getElementById('relogio').textContent = agora.toLocaleTimeString('pt-BR', fHora);
            document.getElementById('data-atual').textContent = agora.toLocaleDateString('pt-BR', fData);
        }

        const spreadsheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRKxl-zvgTVOsrSbHGyDemOfdGq_aTVlkODbyfzlbXdeQGo1SOCipFqc3Dlh6hHl7uAsnMf0WgOX4Bt/pub?output=csv';

        async function fetchPlanilha() {
            const display = document.getElementById('vol-valor');
            const status = document.getElementById('status');
            
            const agora = new Date();
            const dia = String(agora.getDate()).padStart(2, '0');
            const mes = String(agora.getMonth() + 1).padStart(2, '0');
            const ano = agora.getFullYear();
            const hojeCompleto = `${dia}/${mes}/${ano}`;

            try {
                // Forçamos o navegador a ignorar o cache local e o Google a ver uma nova versão
                const response = await fetch(`${spreadsheetUrl}&cachebuster=${Date.now()}`, { 
                    cache: 'no-store'
                });
                
                if (!response.ok) throw new Error();
                
                const csv = await response.text();
                const linhas = csv.split(/\r?\n/);
                let achou = false;

                for (let i = 1; i < linhas.length; i++) {
                    const separador = linhas[i].includes(';') ? ';' : ',';
                    const colunas = linhas[i].split(separador);
                    
                    let dataPlanilha = colunas[0] ? colunas[0].replace(/"/g, '').trim() : "";

                    if (dataPlanilha.includes(hojeCompleto)) {
                        let valorTexto = colunas[2] ? colunas[2].replace(/"/g, '').replace(/\./g, '').replace(',', '.').trim() : "";
                        let valorNumerico = parseFloat(valorTexto) || 0;
                        
                        // LÓGICA DE TRAVA: 
                        // Só atualiza se o valor vindo da planilha for DIFERENTE de zero 
                        // E se for maior ou igual ao que já temos (para ignorar o cache antigo)
                        if (valorNumerico > 0) {
                            if (valorNumerico !== valorAtualNaTela) {
                                display.textContent = colunas[2].replace(/"/g, '').trim();
                                valorAtualNaTela = valorNumerico;
                            }
                        }
                        
                        const horaSinc = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
                        status.textContent = `Sincronizado: ${horaSinc}`;
                        status.style.color = "#00ced1";
                        achou = true;
                        break;
                    }
                }

                if (!achou) {
                    status.textContent = `Data ${hojeCompleto} pendente`;
                    status.style.color = "orange";
                }

            } catch (err) {
                status.textContent = "Tentando reconectar...";
                status.style.color = "#ff4d4d";
            }
        }

        setInterval(atualizarRelogio, 1000);
        atualizarRelogio();
        fetchPlanilha();
        
        // Intervalo de 5 segundos
        setInterval(fetchPlanilha, 5000); 
    </script>
</body>
</html>
