<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Logístico</title>
    <style>
        body {
            background-color: #0b192c;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 1.5vh 1.5vw;
            font-weight: bold;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            gap: 1.5vh;
        }

        header { flex-shrink: 0; }

        #relogio {
            color: #00ced1; 
            font-size: clamp(2em, 4vw, 3em);
            display: block;
            line-height: 1;
        }

        #data-atual {
            color: #a0aec0; 
            font-size: clamp(0.7em, 1vw, 0.9em);
            text-transform: capitalize;
            font-weight: normal;
        }

        .grid-cards {
            display: flex;
            gap: 1vw;
            width: 100%;
            flex-shrink: 0;
        }

        .card {
            background-color: #1a365d;
            border: 2px solid #00ced1;
            border-radius: 15px;
            flex: 1; 
            padding: 1vh 0.8vw;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card h3 {
            margin: 0 0 0.5vh 0;
            color: #a0aec0;
            font-size: clamp(0.6em, 0.8vw, 0.75em);
            text-transform: uppercase;
            letter-spacing: 1px;
            min-height: 2em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .secao-inferior {
            display: flex;
            gap: 1vw;
            flex: 1;
            min-height: 0;
        }

        .container-frotas {
            display: flex;
            flex-direction: column; 
            gap: 1.5vh;
            flex: 1;
        }

        .container-motoristas {
            display: flex;
            flex-direction: column;
            flex: 1; 
        }

        .card-split {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .split-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex: 1;
        }

        .split-item {
            flex: 1;
            border-right: 1px solid rgba(160, 174, 192, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 2px;
        }

        .split-item:last-child { border-right: none; }

        .subtitulo {
            font-size: clamp(0.4em, 0.6vw, 0.55em);
            color: #a0aec0;
            margin-bottom: 2px;
            text-transform: uppercase;
        }

        .valor {
            font-size: clamp(1.5em, 3.5vw, 2.5em);
            color: #ffffff;
            display: block;
        }

        .valor-frota {
            font-size: clamp(1.2em, 2.8vw, 2.2em);
        }

        .status-label {
            font-size: clamp(0.4em, 0.65vw, 0.5em);
            margin-top: 0.5vh;
            font-weight: normal;
            color: #00ced1;
        }
    </style>
</head>
<body>

    <header>
        <span id="relogio">00:00:00</span>
        <span id="data-atual">Carregando...</span>
    </header>

    <div class="grid-cards">
        <div class="card">
            <h3>VOLUME EXPEDIDO (KG)</h3>
            <span class="valor" id="vol-valor">-</span>
            <div class="status-label" id="status-vol">Sincronizando...</div>
        </div>
        <div class="card">
            <h3>DROPSIZE (KG)</h3>
            <span class="valor" id="drop-valor">-</span>
            <div class="status-label" id="status-drop">Sincronizando...</div>
        </div>
        <div class="card">
            <h3>OCUPAÇÃO (%)</h3>
            <span class="valor" id="ocp-valor">-</span>
            <div class="status-label" id="status-ocp">Sincronizando...</div>
        </div>
        <div class="card">
            <h3>NF'S (QTD)</h3>
            <span class="valor" id="nf-valor">-</span>
            <div class="status-label" id="status-nf">Sincronizando...</div>
        </div>
    </div>

    <div class="secao-inferior">
        <div class="container-frotas">
            <div class="card card-split">
                <h3>FROTA PRÓPRIA ENTREGA (QTD) - HOJE</h3>
                <div class="split-container">
                    <div class="split-item">
                        <span class="subtitulo">TOTAL</span>
                        <span class="valor valor-frota" id="f-total">-</span>
                    </div>
                    <div class="split-item">
